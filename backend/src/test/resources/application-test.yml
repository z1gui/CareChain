spring:
  datasource:
    url: jdbc:h2:mem:carechain;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

auth:
  challenge-ttl-minutes: 5
  jwt-expiration-minutes: 120
  jwt-secret: 0123456789abcdef0123456789abcdef
  message-statement: Sign this message to log in to CareChain.

management:
  health:
    redis:
      enabled: ${MANAGEMENT_HEALTH_REDIS_ENABLED:false}
